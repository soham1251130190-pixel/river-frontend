<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Wave Sync</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        canvas {
            border-bottom: 2px solid #444;
            background: radial-gradient(circle, #222 0%, #111 100%);
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .label {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="label">COUPLED HARMONIC RECURSION</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <span id="timer">Cycle: 0%</span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');

        let width, height;
        const numSprings = 15;
        const cycleDuration = 30000; // 30 seconds for a full loop
        const baseOscillations = 20;  // The fastest spring does this many + numSprings

        function resize() {
            width = Math.min(window.innerWidth * 0.9, 800);
            height = 400;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        function drawSpring(x, y, length, coils) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            const step = length / coils;
            for (let i = 0; i < coils; i++) {
                const curY = i * step;
                const nextY = (i + 1) * step;
                const midY = curY + step / 2;
                const xOff = (i % 2 === 0 ? 1 : -1) * 10;
                ctx.quadraticCurveTo(x + xOff, midY, x, nextY);
            }
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate(t) {
            ctx.clearRect(0, 0, width, height);

            const progress = (t % cycleDuration) / cycleDuration;
            timerEl.innerText = `Cycle Progress: ${Math.round(progress * 100)}%`;

            const spacing = width / (numSprings + 1);
            const centerY = height / 2;
            const amplitude = height * 0.3;

            for (let i = 0; i < numSprings; i++) {
                const x = spacing * (i + 1);

                // Each spring has a unique frequency
                // To sync at the end, each must complete an integer number of cycles
                // frequency = (base + i) / totalDuration
                const cycles = baseOscillations + i;
                const theta = 2 * Math.PI * cycles * progress;

                const displacement = Math.sin(theta) * amplitude;
                const massY = centerY + displacement;

                // Draw Spring
                drawSpring(x, massY, massY, 20);

                // Draw Mass
                ctx.beginPath();
                ctx.arc(x, massY, 12, 0, Math.PI * 2);
                // Color shifts based on index for a gradient effect
                ctx.fillStyle = `hsl(${(i * 360 / numSprings)}, 70%, 60%)`;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>

</html>
